<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width,initial-scale=1.0" name="viewport"/>
    <meta content="#6d5dfc" name="theme-color"/>
    <title>BizManage OS</title>
    
    <!-- Fonts & Icons Library -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    
    <!-- Link to external Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Framework Runtime Modules -->
    <script src="https://unpkg.com/react@19/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@19/umd/react-dom.production.min.js" crossorigin></script>
</head>
<body>

    <!-- Boot Loading Screen -->
    <div id="bm-boot-screen" aria-live="polite">
        <div class="bm-boot-card">
            <span class="bm-boot-spinner"></span>
            <span>Opening BizManage…</span>
        </div>
    </div>

    <!-- Main Mount Point -->
    <div id="root"></div>

    <!-- Core Business Application Engine -->
    <script type="module" src="script.js"></script>
    
</body>
</html>
