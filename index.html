<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width,initial-scale=1.0" name="viewport"/>
    <meta content="#6d5dfc" name="theme-color"/>
    <title>BizManage OS</title>
    
    <!-- Fonts Library -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    
    <!-- Link to Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Stable Global Framework Scripts (Strict Loading Order) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
</head>
<body>

    <!-- Boot Loading Screen -->
    <div id="bm-boot-screen">
        <div class="bm-boot-card">
            <span class="bm-boot-spinner"></span>
            <span>Opening BizManage…</span>
        </div>
    </div>

    <!-- React App Mount Point -->
    <div id="root"></div>

    <!-- Main Core Business Application Logic -->
    <script src="script.js" defer></script>
    
</body>
</html>
